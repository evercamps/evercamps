"""
Retrieves a single admin user by ID
"""
type AdminUser {
  adminUserId: Int!
  uuid: String!
  status: Int!
  email: String!
  fullName: String!
  twofaEnabled: Int!
}

"""
Retrieves a collection of admin users
"""
type AdminUserCollection {
  items: [AdminUser]
  currentPage: Int!
  total: Int!
  currentFilters: [Filter]
}

type AdminUser2FASetup {
  qrCodeDataURL: String!
}

extend type Query {
  adminUser(id: Int): AdminUser
  currentAdminUser: AdminUser
  adminUsers(filters: [FilterInput]): AdminUserCollection
  adminUser2FASetup(adminUserId: Int!): AdminUser2FASetup
  verifyAdminUser2FA(adminUserId: Int!, token: String!): Boolean!
}
